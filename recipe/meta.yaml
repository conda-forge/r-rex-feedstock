{% set version = "1.2.2" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rex
  version: "{{ version|replace("-", "_") }}"

source:
  fn: rex_{{ version }}.tar.gz
  url:
    - {{ cran_mirror }}/src/contrib/rex_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/rex/rex_{{ version }}.tar.gz
  sha256: 5c6a6f9bc45507038ae528e71a7f6cd69a77c24c2fed86383a34fd5c86c2ee48

build:
  noarch: generic
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-lazyeval
    - r-magrittr
  run:
    - r-base
    - r-lazyeval
    - r-magrittr

test:
  commands:
    - $R -e "library('rex')"           # [not win]
    - "\"%R%\" -e \"library('rex')\""  # [win]

about:
  home: https://github.com/kevinushey/rex
  license: MIT
  license_file: LICENSE
  summary: A friendly interface for the construction of regular expressions.
  license_family: MIT

extra:
  recipe-maintainers:
    - conda-forge/r
